<body class="min-h-screen flex flex-col justify-between text-slate-800">

                    ⭐⭐ 二星 (進階)
                </button>
                <button onclick="changeDifficulty(3)" id="btn-diff-3" class="px-3 py-1.5 rounded-xl text-xs md:text-sm font-bold transition-all duration-300 flex items-center gap-1 text-slate-500 hover:bg-white/50">

                </span>

    </main>

    <!-- 底部資訊 -->
    <footer class="bg-white border-t border-slate-100 py-3 text-center text-xs text-slate-400">
        <p>© 重組句子拼拼樂 · 專為初小學生設計的中文互動學習系統</p>
    </footer>

    <!-- 自定義答對/答錯反饋 Modal -->
    <div id="feedback-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">

            <h2 id="modal-title" class="text-2xl md:text-3xl font-black text-slate-800 mb-2">太棒了！答對了！</h2>
            
            <div class="bg-slate-50 rounded-2xl p-4 my-4 border border-slate-100">
                <p id="modal-sentence-title" class="text-xs text-slate-400 font-bold mb-1">正確答案句子：</p>
                <p id="modal-sentence" class="text-lg md:text-xl font-black text-emerald-600 tracking-wide leading-relaxed">我今天去公園玩耍。</p>
            </div>

            <p id="modal-message" class="text-slate-500 text-sm md:text-base mb-6 font-medium">你獲得了 10 顆小星星！繼續加油！</p>
            
            <button onclick="closeModalAndNext()" id="modal-next-btn" class="w-full py-4 bg-emerald-50 hover:bg-emerald-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-emerald-200 active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="modal-btn-text">下一題</span>
                <i id="modal-btn-icon" data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- 音效庫 -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'success') {
                    const now = audioCtx.currentTime;
                    const freqs = [523.25, 659.25, 783.99, 1046.50];
                    freqs.forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(f, now + i * 0.1);
                        g.gain.setValueAtTime(0.15, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                        o.start(now + i * 0.1);
                        o.stop(now + i * 0.1 + 0.4);
                    });
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch (e) {
                console.log('Audio Context Error', e);
            }
        }
    </script>

    <!-- 核心邏輯與題目庫 -->
    <script>
        // 題目資料庫：直接萃取自提供的《星願小王子》與《樂思》PDF 內容，並依據難度星級分類
        const questionDatabase = {

                    hint: "提示：有數量詞「一塊」。"
                },

                    correct: ["弟弟", "長", "得", "很高大", "。"],
                    hint: "提示：主語「弟弟」+ 動作「長」+「得」+ 形容動作「很高大」。"

                    context: "河水是怎樣流動的？ (形容詞「地」)",
                    correct: ["河水", "慢慢地", "流動", "。"],
                    hint: "提示：用「慢慢地」修飾「流動」的動作。"
                },
                {
                    context: "同學們在操場上做什麼？ (陳述句:「在」)",
                    correct: ["同學們", "在", "操場上", "快樂地", "唱歌", "。"],
                    hint: "提示：在什麼地方？「在操場上」。"
                },
                {
                    context: "爸爸去哪裡釣魚？ (陳述句:「到」)",
                    correct: ["爸爸", "到", "海邊", "釣魚", "。"],
                    hint: "提示：爸爸「到」海邊「釣魚」。"
                }
            ],
            // ⭐⭐ 二星 (進階句式：時態助詞、感歎句、疑問句、「把/被」字句、比喻句)
            2: [
                {
                    context: "班長被誰責罰了？ (「被」字被動句)",
                    correct: ["班長", "被", "老師", "責罰", "。"],
                    hint: "提示：這是一個「被動句」，被動對象「班長」放在最前面。"
                },
                {
                    context: "姐姐對她的頭髮做了什麼？ (「把」字處置句)",
                    correct: ["姐姐", "把", "長髮", "剪短", "。"],
                    hint: "提示：這是一個「把字句」，「長髮」要放在「把」的後面。"
                },
                {
                    context: "媽媽帶著行李，她的神態怎麼樣？ (時態助詞「著」)",
                    correct: ["媽媽", "拖着", "沉重的", "行李箱", "。"],
                    hint: "提示：時態助詞「着」要緊跟在動作「拖」後面。"
                },
                {
                    context: "大家向對方提出明天的回校詢問： (疑問句「嗎」)",
                    correct: ["同學們", "明天", "會", "回學校", "嗎", "？"],

                },
                {
                    context: "看見美麗的地方，忍不住感歎： (感歎句「啊」)",

                },

                    hint: "提示：被動句，「電話」被留在「座椅上」。"

            ],
            // ⭐⭐⭐ 三星 (挑戰/複句句式：反問句、並列複句、條件複句、遞進複句、承接複句)
            3: [
                {
                    context: "形容爸爸非常焦急著急的樣子： (高階比喻句)",
                    correct: ["緊張的", "爸爸", "像", "熱鍋上的", "螞蟻", "。"],
                    hint: "提示：這是一個比喻句，把爸爸比作螞蟻。"
                },
                {
                    context: "小寶寶為什麼不願意喝牛奶呢？ (反問句「怎麼...呢」)",
                    correct: ["小寶寶", "怎麼", "不肯", "喝奶", "呢", "？"],
                    hint: "提示：反問句，「怎麼」放在人物後，「呢」放在句末。"
                },

                    correct: ["我們", "一面", "賞月", "，", "一面", "吃月餅", "。"],

                    hint: "提示：承接複句，「愈接近......就愈差」。"
                },
                {
                    context: "他跑步跑到了終點後發生了什麼？ (承接複句「剛...就...」)",
                    correct: ["他", "剛", "跑到", "終點", "，", "就", "暈倒", "了", "。"],
                    hint: "提示：兩件事緊接發生，用「剛......就......」連接。"
                },
                {
                    context: "吃蘋果時的先後步驟： (承接複句「先...接著」)",
                    correct: ["你", "先把", "蘋果", "去皮", "，", "接著", "切件", "。"],
                    hint: "提示：動作有先後次序，「先......接著......」。"
                },
                {
                    context: "奶奶學習電腦之後去做了什麼？ (遞進複句「更」)",
                    correct: ["奶奶", "努力", "學習", "電腦", "，", "更到", "社區中心", "當", "導師", "。"],
                    hint: "提示：程度加深，後半句用「更到......當導師」。"
                }
            ]
        };

        // 應用狀態
        let currentDifficulty = 1;
        let currentQuestionIndex = 0; // 0-based
        let currentScore = 0;
        let speechEnabled = true;
        
        let shuffledCards = []; // 目前打亂的卡片 [{id, text}]
        let answerCards = [];   // 小朋友排好的卡片 [{id, text}]
        let currentFeedbackType = 'correct'; // 'correct' | 'wrong-reveal'

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadQuestion();
            updateScoreUI();
        });

        // 換難度
        function changeDifficulty(diff) {
            playSound('click');
            currentDifficulty = diff;
            currentQuestionIndex = 0;
            
            [1, 2, 3].forEach(d => {
                const btn = document.getElementById(`btn-diff-${d}`);
                if (d === diff) {
                    btn.className = "px-3 py-1.5 rounded-xl text-xs md:text-sm font-bold transition-all duration-300 flex items-center gap-1 bg-emerald-500 text-white shadow-md";
                } else {
                    btn.className = "px-3 py-1.5 rounded-xl text-xs md:text-sm font-bold transition-all duration-300 flex items-center gap-1 text-slate-500 hover:bg-white/50";
                }
            });

            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            const list = questionDatabase[currentDifficulty];
            const q = list[currentQuestionIndex];

            document.getElementById('current-index').innerText = currentQuestionIndex + 1;
            document.getElementById('total-questions').innerText = list.length;
            document.getElementById('question-hint').innerText = q.context;

            // 重置本題狀態與提示區
            answerCards = [];
            document.getElementById('hint-strip').classList.add('hidden');

            const originalWords = [...q.correct];
            let cardsWithId = originalWords.map((word, index) => ({ id: index, text: word }));
            
            // 隨機打亂字卡
            let isSame = true;
            while (isSame && cardsWithId.length > 1) {
                for (let i = cardsWithId.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cardsWithId[i], cardsWithId[j]] = [cardsWithId[j], cardsWithId[i]];
                }
                isSame = cardsWithId.every((card, idx) => card.text === originalWords[idx]);
            }

            shuffledCards = cardsWithId;
            renderCards();
        }

        // 渲染字卡
        function renderCards() {
            const poolZone = document.getElementById('cards-pool');
            const answerZone = document.getElementById('answer-zone');
            const placeholder = document.getElementById('empty-placeholder');

            poolZone.innerHTML = '';
            answerZone.innerHTML = '';

            if (answerCards.length === 0) {
                placeholder.classList.remove('hidden');
            } else {
                placeholder.classList.add('hidden');
            }

            // 1. 正常渲染選入「答案區」的字卡
            answerCards.forEach((card) => {
                const cardBtn = document.createElement('button');
                cardBtn.className = `px-4 py-3 md:px-5 md:py-4 bg-emerald-50 text-emerald-600 border-2 border-emerald-400 rounded-2xl font-kids text-lg md:text-2xl active:scale-95 transition-all card-shadow flex items-center justify-center`;
                cardBtn.innerText = card.text;
                cardBtn.onclick = () => removeCardFromAnswer(card);
                answerZone.appendChild(cardBtn);
            });

            // 2. 渲染「字卡池」中剩餘的字卡
            shuffledCards.forEach((card) => {
                const isSelected = answerCards.some(ac => ac.id === card.id);
                const cardBtn = document.createElement('button');
                cardBtn.innerText = card.text;
                
                if (isSelected) {
                    cardBtn.className = "px-4 py-3 md:px-5 md:py-4 bg-transparent border-2 border-transparent text-transparent rounded-2xl font-kids text-lg md:text-2xl pointer-events-none select-none";
                } else {
                    cardBtn.className = "px-4 py-3 md:px-5 md:py-4 bg-white border-2 border-slate-300 hover:border-amber-400 text-slate-800 rounded-2xl font-kids text-lg md:text-2xl active:scale-95 transition-all card-shadow hover:bg-amber-50/50";
                    cardBtn.onclick = () => selectCardToAnswer(card);
                }
                poolZone.appendChild(cardBtn);
            });
        }

        // 點擊字卡：從池子移入答案區
        function selectCardToAnswer(card) {
            playSound('click');
            answerCards.push(card);
            renderCards();
        }

        // 點擊答案區字卡：退回池子
        function removeCardFromAnswer(card) {
            playSound('click');
            answerCards = answerCards.filter(ac => ac.id !== card.id);
            renderCards();
        }

        // 💡 提示對照功能 (在下方展示對照，完全不會重置已選卡片，完美解決 Bug)
        function showHelpHint(shouldSpeak = true) {
            if (shouldSpeak) playSound('click');
            const q = questionDatabase[currentDifficulty][currentQuestionIndex];
            
            const hintStrip = document.getElementById('hint-strip');
            const container = document.getElementById('hint-words-container');
            container.innerHTML = '';
            
            // 動態生成正確的參考影子字卡
            q.correct.forEach(word => {
                const span = document.createElement('span');
                span.className = "px-3 py-1.5 bg-white text-indigo-400 border border-indigo-200 rounded-xl font-bold text-sm md:text-base select-none shadow-sm";
                span.innerText = word;
                container.appendChild(span);
            });
            
            hintStrip.classList.remove('hidden');

            if (shouldSpeak) {
                speakText(q.hint || "跟我一起讀：");
            }
        }

        // 重置當前題目
        function resetCurrentQuestion() {
            playSound('click');
            loadQuestion();
        }

        // 檢查答案 (錯就直接出答案，不提供第二次機會)
        function checkAnswer() {
            const q = questionDatabase[currentDifficulty][currentQuestionIndex];
            const correctOrder = q.correct;

            if (answerCards.length === 0) {
                speakText("請先點擊下面的卡片來排一排。");
                return;
            }

            if (answerCards.length < correctOrder.length) {
                playSound('wrong');
                currentFeedbackType = 'wrong-reveal';
                showFeedbackModal('wrong-reveal', correctOrder.join(''));
                return;
            }

            // 安全比對順序 (防止 undefined text 崩潰)
            let isAllCorrect = true;
            for (let i = 0; i < correctOrder.length; i++) {
                if (!answerCards[i] || answerCards[i].text !== correctOrder[i]) {
                    isAllCorrect = false;
                    break;
                }
            }

            if (isAllCorrect) {
                // 答對了！
                playSound('success');
                currentScore += (currentDifficulty * 10);
                updateScoreUI();

                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });

                currentFeedbackType = 'correct';
                showFeedbackModal('correct', correctOrder.join(''));
            } else {
                // 答錯了！直接顯答
                playSound('wrong');
                currentFeedbackType = 'wrong-reveal';
                showFeedbackModal('wrong-reveal', correctOrder.join(''));
            }
        }

        // 更新得分 UI
        function updateScoreUI() {
            document.getElementById('score').innerText = currentScore;
        }

        // 自定義反饋彈窗邏輯
        function showFeedbackModal(type, fullSentence) {
            const modal = document.getElementById('feedback-modal');
            const card = document.getElementById('modal-card');
            const emoji = document.getElementById('modal-emoji');
            const title = document.getElementById('modal-title');
            const sentenceTitle = document.getElementById('modal-sentence-title');
            const sentence = document.getElementById('modal-sentence');
            const msg = document.getElementById('modal-message');
            
            const btnText = document.getElementById('modal-btn-text');
            const btnIcon = document.getElementById('modal-btn-icon');
            const nextBtn = document.getElementById('modal-next-btn');

            sentence.innerText = fullSentence;

            if (type === 'correct') {
                // 成功狀態
                emoji.innerText = "🎉";
                title.innerText = "太棒了！完全正確！";
                title.className = "text-2xl md:text-3xl font-black text-emerald-600 mb-2";
                sentenceTitle.innerText = "正確答案句子：";
                sentence.className = "text-lg md:text-xl font-black text-emerald-600 tracking-wide leading-relaxed";
                msg.innerText = `你太聰明了！獲得了 ${currentDifficulty * 10} 顆小星星！🌟`;
                
                btnText.innerText = "下一題";
                btnIcon.setAttribute('data-lucide', 'arrow-right');
                nextBtn.className = "w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-emerald-200 active:scale-95 transition-all flex items-center justify-center gap-2";

                setTimeout(() => {
                    speakText("真棒！" + fullSentence);
                }, 500);

            } else if (type === 'wrong-reveal') {
                // 答錯：直接顯示正確答案並播放語音朗讀
                emoji.innerText = "💡";
                title.innerText = "一起來學習吧！";
                title.className = "text-2xl md:text-3xl font-black text-indigo-600 mb-2";
                sentenceTitle.innerText = "正確的句子順序是：";
                sentence.className = "text-lg md:text-xl font-black text-indigo-600 tracking-wide leading-relaxed";
                msg.innerText = "跟着聲音讀一遍，然後挑戰下一題，加油！";
                
                btnText.innerText = "挑戰下一題";
                btnIcon.setAttribute('data-lucide', 'arrow-right');
                nextBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-lg shadow-lg shadow-indigo-200 active:scale-95 transition-all flex items-center justify-center gap-2";

                setTimeout(() => {
                    speakText("別氣餒，正確答案是： " + fullSentence);
                }, 500);
            }

            lucide.createIcons();

            // 展示彈窗動畫
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95', 'opacity-0');
                card.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        // 關閉彈窗並進入下一題
        function closeModalAndNext() {
            const modal = document.getElementById('feedback-modal');
            const card = document.getElementById('modal-card');

            card.classList.remove('scale-100', 'opacity-100');
            card.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                
                const list = questionDatabase[currentDifficulty];
                if (currentQuestionIndex < list.length - 1) {
                    currentQuestionIndex++;
                    loadQuestion();
                } else {
                    alertMastery();
                }
            }, 200);
        }

        // 通關提示
        function alertMastery() {
            speakText("恭喜你！完成這個難度的所有挑戰！你太棒了！");
            
            const duration = 2 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            if (currentDifficulty < 3) {
                setTimeout(() => {
                    changeDifficulty(currentDifficulty + 1);
                }, 2500);
            } else {
                currentQuestionIndex = 0;
                currentScore = 0;
                updateScoreUI();
                changeDifficulty(1);
            }
        }

        // 🔊 朗讀當前排好的句子
        function speakCurrentSentence() {
            playSound('click');
            if (answerCards.length === 0) {
                speakText("請先排好句子再聽讀音。");
                return;
            }
            const txt = answerCards.map(c => c.text).join('');
            speakText(txt);
        }

        // 語音開關控制
        function toggleSpeech() {
            speechEnabled = !speechEnabled;
            const btn = document.getElementById('btn-speech');
            if (speechEnabled) {
                btn.className = "p-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-emerald-50 hover:text-emerald-600 transition-colors";
                btn.innerHTML = `<i data-lucide="volume-2" class="w-5 h-5"></i>`;
                speakText("聲音已開啟");
            } else {
                btn.className = "p-2 rounded-xl bg-rose-100 text-rose-600 transition-colors";
                btn.innerHTML = `<i data-lucide="volume-x" class="w-5 h-5"></i>`;
            }
            lucide.createIcons();
        }

        // 核心語音合成功能
        function speakText(text) {
            if (!speechEnabled) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            const voices = window.speechSynthesis.getVoices();
            let targetVoice = voices.find(v => v.lang.includes('zh-HK') || v.lang.includes('zh-YUE'));
            if (!targetVoice) {
                targetVoice = voices.find(v => v.lang.includes('zh-CN') || v.lang.includes('zh-TW') || v.lang.includes('zh-'));
            }

            if (targetVoice) {
                utterance.voice = targetVoice;
            }
            
            utterance.rate = 0.85; 
            utterance.pitch = 1.1; 
            
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => {
            // 語音引擎初始化監聽
        };
    </script>
</body>
